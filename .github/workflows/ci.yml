name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs the test layers (§8 of the brief) as PARALLEL per-pool jobs.
# The Layer-B (workerd) pool is split into its own job so the upstream
# workerd teardown crash (cloudflare/workerd#6506) — which can only
# produce a false RED on an all-green run — can't abort or contaminate
# the Node-pool result, and so its fail-closed retry guard
# (scripts/run-workerd-tests.mjs) governs only that job's exit.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck

  test-node:
    name: test (node pool)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # `CLOUDFLARE_ACCOUNT_ID` is non-secret; we expose it so any test
      # that opportunistically reaches for it has it. We deliberately do
      # NOT expose `CLOUDFLARE_API_TOKEN` — the e2e project's globalSetup
      # checks for both and self-skips when the token is absent, so
      # PR-level CI doesn't spend live Cloudflare resources. The
      # `e2e.yml` workflow provides the token on push-to-main + nightly.
      - name: test (node pool)
        env:
          CLOUDFLARE_ACCOUNT_ID: 4ef06593037ec81daf64e272ab950efb
        run: pnpm test:node

  test-workerd:
    name: test (workerd pool)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Layer B under real workerd, behind the fail-closed retry guard.
      # A genuine test failure is propagated immediately and never
      # retried; only the upstream all-green teardown crash is tolerated.
      - name: test (workerd pool)
        run: pnpm test:workerd
