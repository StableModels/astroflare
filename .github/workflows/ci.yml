name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI mirrors the four test layers in §8 of the brief:
#   Layer A: framework packages, plain Node            -> `vitest run --project core,...`
#   Layer B: @astroflare/host-cloudflare under workerd -> `vitest run --project host-cloudflare`
#   Layer C: end-to-end assembly in Miniflare           -> `vitest run --project integration`
#   Layer D: differential vs Astro                      -> lives inside compiler's node pool
#
# All four pools run from `pnpm test` because vitest.workspace.ts ties them together.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test
