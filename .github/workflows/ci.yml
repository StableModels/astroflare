name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI mirrors the four test layers in §8 of the brief:
#   Layer A: framework packages, plain Node            -> `vitest run --project core,...`
#   Layer B: @astroflare/host-cloudflare under workerd -> `vitest run --project host-cloudflare`
#   Layer C: end-to-end assembly in Miniflare           -> `vitest run --project integration`
#   Layer D: differential vs Astro                      -> lives inside compiler's node pool
#
# All four pools run from `pnpm test` because vitest.workspace.ts ties them together.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm typecheck

      # Cloudflare credentials are exposed only to the test step. Locally
      # `.envrc` exports `CLOUDFLARE_ACCOUNT_ID` and `dotenv_if_exists
      # .dev.vars` provides `CLOUDFLARE_API_TOKEN` (git-crypt encrypted);
      # neither runs in CI, so we pass them explicitly here. Today's tests
      # (Miniflare, in-process) don't reach the Cloudflare network and these
      # vars are inert; they're in place so any test that opportunistically
      # picks them up (and the future Phase 20 e2e workflow) just works.
      # PRs from forks don't receive `secrets.*` — that's intentional.
      - name: test
        env:
          CLOUDFLARE_ACCOUNT_ID: 4ef06593037ec81daf64e272ab950efb
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm test
